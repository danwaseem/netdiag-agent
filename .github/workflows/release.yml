name: Release artifact

on:
  push:
    tags:
      - "v*"

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Zip repository
        run: |
          TAG="${GITHUB_REF##*/}"
          zip -r "netdiag-${TAG}.zip" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: netdiag-${{ github.ref_name }}
          path: netdiag-*.zip
